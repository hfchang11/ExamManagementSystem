spring.application.name=demo4

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=exam_management_system;encrypt=true;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123456789

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

spring.h2.console.enabled=true

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Demo user (must exist in users.user_id)
demo.student-id=00000000-0000-0000-0000-000000000000
